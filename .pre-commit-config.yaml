repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: project-smoke
        name: project-smoke
        entry: uv run python -c "from ptn_analysis.reporting import REPORT_NOTEBOOKS; from ptn_analysis.context.serving import Dashboard; assert REPORT_NOTEBOOKS; print('project smoke ok')"
        language: system
        pass_filenames: false
